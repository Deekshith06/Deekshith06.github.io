name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Regenerate one-time portrait reveal
        run: python3 scripts/make_portrait_svg.py

      - name: Validate one-screen portfolio
        run: python3 scripts/validate_site.py

      - name: Check JavaScript syntax
        run: node --check assets/app.js

      - name: Build static artifact
        run: |
          mkdir -p _site
          cp -R index.html 404.html assets robots.txt sitemap.xml .nojekyll _site/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
